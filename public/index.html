<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Real-time weather app — search any city worldwide."/>
  <title>Sky Watch</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header class="header">
    <h1>Sky Watch</h1>
    <p class="date-time" id="dateTime"></p>
  </header>

  <main>
    <!-- Search bar -->
    <div class="search-wrap">
      <div class="search">
        <span class="search-icon">🔍</span>
        <input type="text" id="cityInput" placeholder="Search city — e.g. Mumbai, London..." autocomplete="off"/>
        <button id="geoBtn" class="geo-btn" title="Use my location">📍</button>
        <button id="searchBtn" class="search-btn">Search</button>
      </div>
      <!-- Quick city chips -->
      <div class="chips">
        <button class="chip" data-city="Mumbai">Mumbai</button>
        <button class="chip" data-city="London">London</button>
        <button class="chip" data-city="New York">New York</button>
        <button class="chip" data-city="Tokyo">Tokyo</button>
        <button class="chip" data-city="Sydney">Sydney</button>
      </div>
    </div>

    <!-- Unit toggle -->
    <div class="unit-wrap">
      <button id="unitToggle" class="unit-btn">°C / °F</button>
    </div>

    <!-- Loading -->
    <div class="spinner" id="spinner"></div>

    <!-- Error -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- Welcome state -->
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🌍</div>
      <p class="welcome-text">Search a city or use your location<br/>to get live weather data.</p>
    </div>

    <!-- Current weather card -->
    <div class="card" id="currentCard">
      <div class="current-top">
        <div>
          <div class="city-name" id="cityName"></div>
          <span class="country-badge" id="country"></span>
        </div>
        <div class="weather-icon" id="weatherIcon"></div>
      </div>

      <div class="temp-row">
        <div class="temp" id="temp"></div>
        <div class="temp-range">
          <span class="temp-hi" id="tempHi"></span>
          <span class="temp-lo" id="tempLo"></span>
        </div>
      </div>
      <span class="condition-badge" id="desc"></span>

      <div class="divider"></div>

      <div class="stats-grid">
        <div class="stat">
          <span class="stat-icon">🤔</span>
          <div>
            <div class="stat-label">Feels Like</div>
            <div class="stat-value" id="feelsLike"></div>
          </div>
        </div>
        <div class="stat">
          <span class="stat-icon">💧</span>
          <div>
            <div class="stat-label">Humidity</div>
            <div class="stat-value" id="humidity"></div>
          </div>
        </div>
        <div class="stat">
          <span class="stat-icon">💨</span>
          <div>
            <div class="stat-label">Wind</div>
            <div class="stat-value" id="wind"></div>
          </div>
        </div>
        <div class="stat">
          <span class="stat-icon">🌡️</span>
          <div>
            <div class="stat-label">Pressure</div>
            <div class="stat-value" id="pressure"></div>
          </div>
        </div>
        <div class="stat">
          <span class="stat-icon">👁️</span>
          <div>
            <div class="stat-label">Visibility</div>
            <div class="stat-value" id="visibility"></div>
          </div>
        </div>
        <div class="stat">
          <span class="stat-icon">☁️</span>
          <div>
            <div class="stat-label">Condition</div>
            <div class="stat-value" id="condition"></div>
          </div>
        </div>
        <div class="stat">
          <span class="stat-icon">🌅</span>
          <div>
            <div class="stat-label">Sunrise</div>
            <div class="stat-value" id="sunrise"></div>
          </div>
        </div>
        <div class="stat">
          <span class="stat-icon">🌇</span>
          <div>
            <div class="stat-label">Sunset</div>
            <div class="stat-value" id="sunset"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Forecast card -->
    <div class="card" id="forecastCard">
      <div class="section-title">Next 15 Hours</div>
      <div class="forecast-list" id="forecastList"></div>
    </div>
  </main>

  <footer class="footer">
    Built with Node.js &amp; OpenWeatherMap &bull; Sky Watch
  </footer>

  <script src="app.js"></script>
</body>
</html>
